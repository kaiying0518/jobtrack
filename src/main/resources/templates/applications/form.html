<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${applicationId != null} ? '応募詳細' : '新規応募'">応募詳細</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
</head>

<body th:attr="data-new=${applicationId == null}">
<div class="app-shell" id="app-shell">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-main">
                <div class="brand brand-full">JobTrack</div>
                <div class="brand brand-mini">JT</div>
            </div>

            <button type="button" class="sidebar-toggle" id="sidebar-toggle-btn" aria-label="メニュー切り替え">
                ☰
            </button>
        </div>

        <nav class="nav-group">
            <a class="nav-link" th:href="@{/dashboard}">
                <span class="nav-icon">⌂</span>
                <span class="nav-label">ホーム</span>
            </a>
            <a class="nav-link active" th:href="@{/applications}">
                <span class="nav-icon">▤</span>
                <span class="nav-label">応募一覧</span>
            </a>
            <a class="nav-link" th:href="@{/reflections}">
                <span class="nav-icon">✦</span>
                <span class="nav-label">振り返り</span>
            </a>
            <a class="nav-link" th:href="@{/settings}">
                <span class="nav-icon">⚙</span>
                <span class="nav-label">設定</span>
            </a>
        </nav>
    </aside>

    <main class="main">
        <form id="application-form"
              th:action="${applicationId != null} ? @{/applications/{id}/edit(id=${applicationId})} : @{/applications}"
              method="post"
              th:object="${application}">

            <input type="hidden" th:field="*{id}">

            <div class="topbar">
                <div class="topbar-left">
                    <h1 class="page-title"
                        th:text="${applicationId == null ? '新規応募' : (application.companyName != null and !#strings.isEmpty(application.companyName) ? application.companyName : '応募詳細')}">
                        応募詳細
                    </h1>
                </div>

                <div class="topbar-actions">
                    <a class="btn btn-secondary" th:href="@{/applications}">一覧に戻る</a>
                </div>
            </div>

            <div th:if="${errorMessage}" class="card card-alert card-alert-danger">
                <p th:text="${errorMessage}" style="margin: 0;">エラーがあります</p>
            </div>

            <section class="grid-2 form-grid">
                <div class="card">
                    <div class="card-title-row">
                        <h2 class="card-title">基本情報</h2>
                    </div>

                    <div class="detail-list-rows">
                        <div class="detail-field">
                            <label class="info-label">会社名</label>
                            <input class="input detail-edit" type="text" th:field="*{companyName}" required>
                        </div>

                        <div class="detail-field">
                            <label class="info-label">職種</label>
                            <input class="input detail-edit" type="text" th:field="*{positionName}">
                        </div>

                        <div class="detail-field">
                            <label class="info-label">応募方法</label>
                            <select class="select detail-edit" th:field="*{channel}">
                                <option value="">選択してください</option>
                                <option value="DIRECT">直接応募</option>
                                <option value="JOB_SITE">求人サイト</option>
                                <option value="AGENT">エージェント</option>
                                <option value="SCOUT">スカウト</option>
                                <option value="OTHER">その他</option>
                            </select>
                        </div>

                        <div class="detail-field">
                            <label class="info-label">履歴書バージョン</label>
                            <input class="input detail-edit" type="text" th:field="*{resumeVersion}">
                        </div>

                        <div class="detail-field">
                            <label class="info-label">今の状況</label>
                            <select class="select detail-edit" th:field="*{currentStatus}">
                                <option value="APPLIED">応募済み</option>
                                <option value="WEB_TEST">WEBテスト</option>
                                <option value="DOCUMENT_PASS">書類通過</option>
                                <option value="INTERVIEW_1">一次面接</option>
                                <option value="INTERVIEW_2">二次面接</option>
                                <option value="FINAL_INTERVIEW">最終面接</option>
                                <option value="OFFER">内定</option>
                                <option value="REJECT">見送り</option>
                                <option value="WITHDRAWN">辞退</option>
                            </select>
                        </div>

                        <div class="detail-field">
                            <label class="info-label">応募日</label>
                            <input class="input detail-edit" type="date" th:field="*{appliedDate}">
                        </div>

                        <div class="detail-field">
                            <label class="info-label">次の予定</label>
                            <input class="input detail-edit" type="datetime-local" th:field="*{nextActionAt}">
                        </div>

                        <div class="detail-field">
                            <label class="info-label">求人ページ</label>
                            <input class="input detail-edit" type="text" th:field="*{jobUrl}" placeholder="https://...">
                        </div>

                        <div class="detail-field detail-field-textarea">
                            <label class="info-label">メモ</label>
                            <textarea class="textarea detail-edit detail-memo-edit" th:field="*{memo}"></textarea>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title-row">
                        <h2 class="card-title">採用ページ情報</h2>
                    </div>

                    <div class="detail-list-rows">
                        <div class="detail-field">
                            <label class="info-label">システム名</label>
                            <select class="select detail-edit" name="portalName">
                                <option value="">選択してください</option>
                                <option value="HERP">HERP</option>
                                <option value="Talentio">Talentio</option>
                                <option value="HRMOS">HRMOS</option>
                                <option value="MyPage">MyPage</option>
                                <option value="自社採用ページ">自社採用ページ</option>
                            </select>
                        </div>

                        <div class="detail-field">
                            <label class="info-label">ログインID</label>
                            <input class="input detail-edit" name="loginId" type="text">
                        </div>

                        <div class="detail-field">
                            <label class="info-label">ログインページ</label>
                            <input class="input detail-edit" name="portalUrl" type="text" placeholder="https://...">
                        </div>

                        <div class="detail-field detail-field-textarea">
                            <label class="info-label">メモ</label>
                            <textarea class="textarea detail-edit detail-memo-edit" name="loginMemo"></textarea>
                        </div>
                    </div>
                </div>
            </section>

            <div class="detail-bottom-actions">
                <button id="detail-save-btn"
                        class="btn btn-primary detail-save-btn"
                        type="submit">
                    変更を保存
                </button>

                <button type="submit"
                        class="btn btn-danger"
                        th:if="${applicationId != null}"
                        form="delete-form">
                    削除
                </button>
            </div>
        </form>

        <form id="delete-form"
              th:if="${applicationId != null}"
              th:action="@{/applications/{id}/delete(id=${applicationId})}"
              method="post"
              onsubmit="return confirm('この応募情報を削除しますか？');">
        </form>
    </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const appShell = document.getElementById("app-shell");
    const sidebarToggleBtn = document.getElementById("sidebar-toggle-btn");
    const saveBtn = document.getElementById("detail-save-btn");
    const isNew = document.body.dataset.new === "true";

    if (sidebarToggleBtn && appShell) {
        sidebarToggleBtn.addEventListener("click", function () {
            appShell.classList.toggle("sidebar-collapsed");
        });
    }

    document.querySelectorAll(".detail-edit").forEach(input => {
        input.addEventListener("input", function () {
            if (saveBtn) {
                saveBtn.style.display = "inline-flex";
            }
        });

        input.addEventListener("change", function () {
            if (saveBtn) {
                saveBtn.style.display = "inline-flex";
            }
        });
    });

    if (saveBtn) {
        saveBtn.style.display = isNew ? "inline-flex" : "none";
    }
});
</script>
</body>
</html>
