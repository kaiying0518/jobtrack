<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>応募一覧</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
</head>
<body>
<div class="app-shell" id="app-shell">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-main">
                <div class="brand brand-full">JobTrack</div>
                <div class="brand brand-mini">JT</div>
            </div>

            <button type="button" class="sidebar-toggle" id="sidebar-toggle-btn" aria-label="メニュー切り替え">
                ☰
            </button>
        </div>

        <nav class="nav-group">
            <a class="nav-link" th:href="@{/dashboard}">
                <span class="nav-icon">⌂</span>
                <span class="nav-label">ホーム</span>
            </a>
            <a class="nav-link active" th:href="@{/applications}">
                <span class="nav-icon">▤</span>
                <span class="nav-label">応募一覧</span>
            </a>
            <a class="nav-link" th:href="@{/reflections}">
                <span class="nav-icon">✦</span>
                <span class="nav-label">振り返り</span>
            </a>
            <a class="nav-link" th:href="@{/settings}">
                <span class="nav-icon">⚙</span>
                <span class="nav-label">設定</span>
            </a>
        </nav>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="topbar-left">
                <h1 class="page-title">応募一覧</h1>
            </div>

            <div class="topbar-actions">
                <a class="btn btn-primary" th:href="@{/applications/new}">＋ 新しく追加</a>
            </div>
        </div>

        <section class="card compact-card">
            <div class="card-title-row">
                <h2 class="card-title">条件で探す</h2>
            </div>

            <form class="filter-bar" th:action="@{/applications}" method="get">
                <input class="input" type="text" name="keyword"
                       placeholder="会社名・職種で検索"
                       th:value="${keyword}">

                <select class="select" name="status">
                    <option value="">すべての状況</option>
                    <option value="APPLIED" th:selected="${status == 'APPLIED'}">応募済み</option>
                    <option value="WEB_TEST" th:selected="${status == 'WEB_TEST'}">Webテスト</option>
                    <option value="DOCUMENT_PASS" th:selected="${status == 'DOCUMENT_PASS'}">書類通過</option>
                    <option value="INTERVIEW_1" th:selected="${status == 'INTERVIEW_1'}">一次面接</option>
                    <option value="INTERVIEW_2" th:selected="${status == 'INTERVIEW_2'}">二次面接</option>
                    <option value="FINAL_INTERVIEW" th:selected="${status == 'FINAL_INTERVIEW'}">最終面接</option>
                    <option value="OFFER" th:selected="${status == 'OFFER'}">内定</option>
                    <option value="REJECT" th:selected="${status == 'REJECT'}">見送り</option>
                    <option value="WITHDRAWN" th:selected="${status == 'WITHDRAWN'}">辞退</option>
                </select>

                <select class="select" name="channel">
                    <option value="">すべての応募方法</option>
                    <option value="DIRECT" th:selected="${channel == 'DIRECT'}">企業サイトから直接応募</option>
                    <option value="JOB_SITE" th:selected="${channel == 'JOB_SITE'}">求人サイト</option>
                    <option value="AGENT" th:selected="${channel == 'AGENT'}">エージェント</option>
                    <option value="SCOUT" th:selected="${channel == 'SCOUT'}">スカウト</option>
                    <option value="OTHER" th:selected="${channel == 'OTHER'}">その他</option>
                </select>

                <select class="select" name="sort">
                    <option value="updatedAt" th:selected="${sort == 'updatedAt'}">最近更新順</option>
                    <option value="appliedDate" th:selected="${sort == 'appliedDate'}">応募日順</option>
                    <option value="companyName" th:selected="${sort == 'companyName'}">会社名順</option>
                </select>

                <button class="btn btn-secondary" type="submit">絞り込む</button>
            </form>
        </section>

        <section class="card compact-card">
            <div class="card-title-row">
                <h2 class="card-title">応募一覧</h2>
                <span class="card-subtext">
                    <span th:text="${#lists.size(applications)}">0</span> 件
                </span>
            </div>

            <div class="table-wrap" th:if="${applications != null and !#lists.isEmpty(applications)}">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>会社 / 職種</th>
                        <th>応募方法</th>
                        <th>今の状況</th>
                        <th>応募日</th>
                        <th>次の予定</th>
                        <th>最終更新</th>
                        <th>詳細</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="app : ${applications}"
                        th:attr="data-updated-at=${app.updatedAt != null ? #temporals.format(app.updatedAt, 'yyyy-MM-dd') : ''},
                                 data-next-action-at=${app.nextActionAt != null ? #temporals.format(app.nextActionAt, 'yyyy-MM-dd') : ''}">
                        <td>
                            <div class="company-cell">
                                <div class="company-name" th:text="${app.companyName}">会社名</div>
                                <div class="company-role" th:text="${app.positionName}">職種</div>
                            </div>
                        </td>

                        <td th:text="${app.channel == null or #strings.isEmpty(app.channel)} ? '未設定' :
                            (${app.channel == 'JOB_SITE'} ? '求人サイト' :
                            (${app.channel == 'AGENT'} ? 'エージェント' :
                            (${app.channel == 'SCOUT'} ? 'スカウト' :
                            (${app.channel == 'DIRECT'} ? '直接応募' : app.channel))))">
                            応募方法
                        </td>

                        <td>
                            <span class="badge"
                                  th:classappend="${app.currentStatus == null ? ' badge-applied' :
                                  (app.currentStatus.name() == 'APPLIED' ? ' badge-applied' :
                                  (app.currentStatus.name() == 'WEB_TEST' ? ' badge-web-test' :
                                  (app.currentStatus.name() == 'DOCUMENT_PASS' ? ' badge-doc-pass' :
                                  (app.currentStatus.name() == 'INTERVIEW_1' or app.currentStatus.name() == 'INTERVIEW_2' or app.currentStatus.name() == 'FINAL_INTERVIEW' ? ' badge-interview' :
                                  (app.currentStatus.name() == 'OFFER' ? ' badge-offer' :
                                  (app.currentStatus.name() == 'REJECT' ? ' badge-reject' : ' badge-withdrawn'))))))}"
                                  th:text="${app.currentStatus == null ? '未設定' : app.currentStatus.label}">
                                応募済み
                            </span>
                        </td>

                        <td th:text="${app.appliedDate}">2026-03-26</td>

                        <td>
                            <span th:if="${app.nextActionAt != null}"
                                  th:text="${#temporals.format(app.nextActionAt, 'yyyy-MM-dd HH:mm')}">
                                2026-03-26 14:00
                            </span>
                            <span th:if="${app.nextActionAt == null}">-</span>
                        </td>

                        <td th:text="${#temporals.format(app.updatedAt, 'yyyy-MM-dd HH:mm')}">
                            2026-03-26
                        </td>

                        <td>
                            <a class="text-link" th:href="@{/applications/{id}/edit(id=${app.id})}">
                                詳細
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty-box" th:if="${applications == null or #lists.isEmpty(applications)}">
                まだ応募はありません。
            </div>
        </section>
    </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const appShell = document.getElementById("app-shell");
    const sidebarToggleBtn = document.getElementById("sidebar-toggle-btn");

    if (sidebarToggleBtn && appShell) {
        sidebarToggleBtn.addEventListener("click", function () {
            appShell.classList.toggle("sidebar-collapsed");
        });
    }

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const tomorrow = new Date(today);
    tomorrow.setDate(today.getDate() + 1);

    document.querySelectorAll(".data-table tbody tr").forEach(row => {
        const updatedAtText = row.dataset.updatedAt;
        const nextActionAtText = row.dataset.nextActionAt;

        if (updatedAtText) {
            const updatedAt = new Date(updatedAtText);
            updatedAt.setHours(0, 0, 0, 0);

            const diffDays = Math.floor((today - updatedAt) / (1000 * 60 * 60 * 24));

            if (diffDays >= 14) {
                row.classList.add("inactive-row");
            }
        }

        if (nextActionAtText) {
            const nextActionAt = new Date(nextActionAtText);
            nextActionAt.setHours(0, 0, 0, 0);

            if (nextActionAt.getTime() === tomorrow.getTime()) {
                row.classList.add("tomorrow-row");
            }
        }
    });
});
</script>
</body>
</html>
