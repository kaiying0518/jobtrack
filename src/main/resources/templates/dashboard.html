<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホーム</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">JobTrack</div>
        <nav class="nav-group">
            <a class="nav-link active" th:href="@{/dashboard}">ホーム</a>
            <a class="nav-link" th:href="@{/applications}">応募一覧</a>
            <a class="nav-link" th:href="@{/reflections}">振り返り</a>
            <a class="nav-link" th:href="@{/settings}">設定</a>
        </nav>
    </aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h1 class="page-title">総覧</h1>
                <p class="page-desc">
                    応募状況をまとめて確認できます。
                </p>
            </div>
           
        </div>

        <section class="grid-4">
            <div class="card stat-card">
                <div class="stat-label">総応募数</div>
                <div class="stat-value" th:text="${totalCount}">0</div>
                <div class="stat-sub">今週 <span th:text="${weeklyApplyCount}">0</span></div>
            </div>

            <div class="card stat-card">
                <div class="stat-label">WEBテスト / 書類通過</div>
                <div class="stat-value">
                    <span th:text="${webTestCount}">0</span> /
                    <span th:text="${documentPassCount}">0</span>
                </div>
                <div class="stat-sub">
                    書類通過率 <span th:text="${documentPassRate}">0%</span>
                </div>
            </div>

            <div class="card stat-card">
                <div class="stat-label">面接中</div>
                <div class="stat-value" th:text="${interviewCount}">0</div>
                <div class="stat-sub" th:text="${interviewBreakdown}">一次 0 / 最終 0</div>
            </div>

            <div class="card stat-card">
                <div class="stat-label">内定 / 見送り</div>
                <div class="stat-value">
                    <span th:text="${offerCount}">0</span> /
                    <span th:text="${rejectCount}">0</span>
                </div>
                <div class="stat-sub">辞退 <span th:text="${withdrawnCount}">0</span></div>
            </div>
        </section>

        <section class="grid-2">
            <div class="card">
                <div class="card-title-row">
                    <h2 class="card-title">最近更新した応募</h2>
                    <a class="text-link" th:href="@{/applications}">すべて見る</a>
                </div>

                <div class="mini-list" th:if="${recentApplications != null and !#lists.isEmpty(recentApplications)}">
                    <div class="mini-item" th:each="app : ${recentApplications}">
                        <div>
                            <div class="mini-title" th:text="${app.companyName}">会社名</div>
                            <div class="mini-sub">
                                <span th:text="${app.positionName}">職種</span>
                                ·
                                <span th:text="${app.channel}">応募経由</span>
                            </div>
                        </div>

                        <span class="badge"
                              th:text="${app.currentStatus == null ? '未設定' : app.currentStatus.label}">
                            応募済み
                        </span>
                    </div>
                </div>

                <div class="empty-box" th:if="${recentApplications == null or #lists.isEmpty(recentApplications)}">
                    まだ応募データがありません。
                </div>
            </div>

			<div class="card">
			    <div class="card-title-row">
			        <h2 class="card-title">AI Summary</h2>
			    </div>

			    <div class="empty-box" style="white-space: pre-line;">
			        まだAIサマリーはありません。
			        AI連携後、ここに短い要約を表示します。
			    </div>
			</div>
        </section>
    </main>
</div>
</body>
</html>
