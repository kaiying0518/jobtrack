<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホーム</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
</head>
<body>
<div class="app-shell" id="app-shell">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-main">
                <div class="brand brand-full">JobTrack</div>
                <div class="brand brand-mini">JT</div>
            </div>

            <button type="button" class="sidebar-toggle" id="sidebar-toggle-btn" aria-label="メニュー切り替え">
                ☰
            </button>
        </div>

        <nav class="nav-group">
            <a class="nav-link active" th:href="@{/dashboard}">
                <span class="nav-icon">⌂</span>
                <span class="nav-label">ホーム</span>
            </a>
            <a class="nav-link" th:href="@{/applications}">
                <span class="nav-icon">▤</span>
                <span class="nav-label">応募一覧</span>
            </a>
            <a class="nav-link" th:href="@{/reflections}">
                <span class="nav-icon">✦</span>
                <span class="nav-label">振り返り</span>
            </a>
            <a class="nav-link" th:href="@{/settings}">
                <span class="nav-icon">⚙</span>
                <span class="nav-label">設定</span>
            </a>
        </nav>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="topbar-left">
                <div>
                    <h1 class="page-title">総覧</h1>
                </div>
            </div>
        </div>

        <section class="grid-4">
            <div class="card stat-card">
                <div class="stat-label">総応募数</div>
                <div class="stat-value" th:text="${totalCount}">0</div>
                <div class="stat-sub">今週 <span th:text="${weeklyApplyCount}">0</span></div>
            </div>

            <div class="card stat-card">
                <div class="stat-label">WEBテスト / 書類通過</div>
                <div class="stat-value">
                    <span th:text="${webTestCount}">0</span> /
                    <span th:text="${documentPassCount}">0</span>
                </div>
                <div class="stat-sub">
                    書類通過率 <span th:text="${documentPassRate}">0%</span>
                </div>
            </div>

            <div class="card stat-card">
                <div class="stat-label">面接中</div>
                <div class="stat-value" th:text="${interviewCount}">0</div>
                <div class="stat-sub" th:text="${interviewBreakdown}">一次 0 / 最終 0</div>
            </div>

            <div class="card stat-card">
                <div class="stat-label">内定 / 見送り</div>
                <div class="stat-value">
                    <span th:text="${offerCount}">0</span> /
                    <span th:text="${rejectCount}">0</span>
                </div>
                <div class="stat-sub">辞退 <span th:text="${withdrawnCount}">0</span></div>
            </div>
        </section>

        <section class="grid-2 dashboard-grid">
            <div class="card compact-card">
                <div class="card-title-row">
                    <h2 class="card-title">最近更新した応募</h2>
                </div>

                <div class="compact-list" th:if="${recentApplications != null and !#lists.isEmpty(recentApplications)}">
                    <div class="compact-row" th:each="app : ${recentApplications}">
                        <div class="compact-main">
                            <div class="compact-title" th:text="${app.companyName}">会社名</div>
                            <div class="compact-sub">
                                <span th:text="${app.positionName}">職種</span>
                                <span th:if="${app.positionName != null and !#strings.isEmpty(app.positionName)} and ${app.channel != null and !#strings.isEmpty(app.channel)}"> · </span>
                                <span th:text="${app.channel}">応募経由</span>
                            </div>
                        </div>

                        <span class="badge"
                              th:classappend="${
                                  app.currentStatus == null ? ' badge-applied' :
                                  (app.currentStatus.name() == 'APPLIED' ? ' badge-applied' :
                                  (app.currentStatus.name() == 'WEB_TEST' ? ' badge-web-test' :
                                  (app.currentStatus.name() == 'DOCUMENT_PASS' ? ' badge-doc-pass' :
                                  (app.currentStatus.name() == 'INTERVIEW_1' or app.currentStatus.name() == 'INTERVIEW_2' or app.currentStatus.name() == 'FINAL_INTERVIEW' ? ' badge-interview' :
                                  (app.currentStatus.name() == 'OFFER' ? ' badge-offer' :
                                  (app.currentStatus.name() == 'REJECT' ? ' badge-reject' : ' badge-withdrawn'))))))}"
                              th:text="${app.currentStatus == null ? '未設定' : app.currentStatus.label}">
                            応募済み
                        </span>
                    </div>
                </div>

                <div class="empty-box" th:if="${recentApplications == null or #lists.isEmpty(recentApplications)}">
                    まだ応募データがありません。
                </div>
            </div>

            <div class="card">
                <div class="card-title-row">
                    <h2 class="card-title">AI Summary</h2>
                </div>

				<div id="dashboard-ai-summary"
				     class="empty-box dashboard-summary-placeholder"
				     style="white-space: pre-line;">
				    まだAIサマリーはありません。
				</div>
            </div>
        </section>
    </main>
</div>

<script th:inline="javascript">
document.addEventListener("DOMContentLoaded", function () {
    const AI_SUMMARY_STORAGE_KEY = "jobtrack_ai_summary";
    const totalCount = /*[[${totalCount}]]*/ 0;

    const appShell = document.getElementById("app-shell");
    const sidebarToggleBtn = document.getElementById("sidebar-toggle-btn");
    const dashboardSummary = document.getElementById("dashboard-ai-summary");

    if (sidebarToggleBtn && appShell) {
        sidebarToggleBtn.addEventListener("click", function () {
            appShell.classList.toggle("sidebar-collapsed");
        });
    }

    if (dashboardSummary) {
        if (totalCount === 0) {
            localStorage.removeItem(AI_SUMMARY_STORAGE_KEY);
            dashboardSummary.textContent = "まだ応募データがありません。応募情報を登録すると、AIサマリーを確認できます。";
            return;
        }

        const savedSummary = localStorage.getItem(AI_SUMMARY_STORAGE_KEY);

        if (savedSummary && savedSummary.trim()) {
            dashboardSummary.textContent = savedSummary;
        } else {
            dashboardSummary.textContent = "まだAIサマリーはありません。";
        }
    }
});
</script>
</body>
</html>
