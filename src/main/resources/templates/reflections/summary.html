<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>振り返り</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
</head>
<body>
<div class="app-shell" id="app-shell">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-main">
                <div class="brand brand-full">JobTrack</div>
                <div class="brand brand-mini">JT</div>
            </div>

            <button type="button" class="sidebar-toggle" id="sidebar-toggle-btn" aria-label="メニュー切り替え">
                ☰
            </button>
        </div>

        <nav class="nav-group">
            <a class="nav-link" th:href="@{/dashboard}">
                <span class="nav-icon">⌂</span>
                <span class="nav-label">ホーム</span>
            </a>
            <a class="nav-link" th:href="@{/applications}">
                <span class="nav-icon">▤</span>
                <span class="nav-label">応募一覧</span>
            </a>
            <a class="nav-link active" th:href="@{/reflections}">
                <span class="nav-icon">✦</span>
                <span class="nav-label">振り返り</span>
            </a>
            <a class="nav-link" th:href="@{/settings}">
                <span class="nav-icon">⚙</span>
                <span class="nav-label">設定</span>
            </a>
        </nav>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="topbar-left">
                <div>
                    <h1 class="page-title">振り返り</h1>
                </div>
            </div>
        </div>

        <section class="card summary-card">
            <div class="card-title-row">
                <h2 class="card-title">AI Summary</h2>
                <button type="button" id="generate-ai-summary-btn" class="btn btn-primary">
                    生成
                </button>
            </div>

            <div id="ai-summary-loading" class="card-subtext summary-loading" style="display:none;">
                生成中...
            </div>

            <div id="ai-summary-result" class="summary-result empty-box" style="white-space: pre-line;">
                まだ生成されていません。
            </div>
        </section>

        <section class="card chat-card">
            <div class="card-title-row">
                <h2 class="card-title">AI Chat</h2>
            </div>

            <div class="chat-layout">
                <aside class="chat-sidebar-panel">
                    <div class="chat-sidebar-top">
                        <button type="button" id="new-chat-btn" class="btn btn-secondary btn-block">
                            ＋ 新しいチャット
                        </button>
                    </div>

                    <div id="chat-session-list" class="chat-session-list">
                        <div class="chat-empty">読み込み中...</div>
                    </div>
                </aside>

                <section class="chat-main-panel">
                    <div class="chat-main-header">
                        <div>
                            <div class="chat-main-title" id="current-chat-title">新しいチャット</div>
                        </div>
                        <div id="ai-chat-loading" class="card-subtext" style="display:none;">
                            応答中...
                        </div>
                    </div>

                    <div id="chat-message-list" class="chat-message-list">
                        <div class="chat-empty">まだ対話はありません。新しいメッセージを送ってください。</div>
                    </div>

                    <div class="chat-input-area">
                        <textarea id="ai-chat-input"
                                  class="textarea chat-textarea"
                                  placeholder="例：今の応募状況から次にやるべきことを教えてください"></textarea>

                        <div class="chat-action-row">
                            <button type="button" id="send-ai-chat-btn" class="btn btn-primary">
                                送信
                            </button>
                        </div>
                    </div>
                </section>
            </div>
        </section>
    </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const AI_SUMMARY_STORAGE_KEY = "jobtrack_ai_summary";

    const appShell = document.getElementById("app-shell");
    const sidebarToggleBtn = document.getElementById("sidebar-toggle-btn");

    const summaryButton = document.getElementById("generate-ai-summary-btn");
    const summaryLoading = document.getElementById("ai-summary-loading");
    const summaryResult = document.getElementById("ai-summary-result");

    const chatButton = document.getElementById("send-ai-chat-btn");
    const chatInput = document.getElementById("ai-chat-input");
    const chatLoading = document.getElementById("ai-chat-loading");
    const messageList = document.getElementById("chat-message-list");
    const sessionList = document.getElementById("chat-session-list");
    const newChatButton = document.getElementById("new-chat-btn");
    const currentChatTitle = document.getElementById("current-chat-title");

    let currentChatId = null;
    let sessions = [];

    if (sidebarToggleBtn && appShell) {
        sidebarToggleBtn.addEventListener("click", function () {
            appShell.classList.toggle("sidebar-collapsed");
        });
    }

    // 保存済みAIサマリーを復元
    if (summaryResult) {
        const savedSummary = localStorage.getItem(AI_SUMMARY_STORAGE_KEY);
        if (savedSummary && savedSummary.trim()) {
            summaryResult.textContent = savedSummary;
        }
    }

    if (summaryButton && summaryLoading && summaryResult) {
        summaryButton.addEventListener("click", async function () {
            summaryButton.disabled = true;
            summaryLoading.style.display = "block";
            summaryResult.textContent = "";

            try {
                const response = await fetch("/reflections/ai-summary", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" }
                });

                const data = await response.json();

                if (!response.ok || data.success === false) {
                    summaryResult.textContent = data.error || "AIサマリーの生成に失敗しました。";
                    return;
                }

                const summary = data.summary || "AIサマリーを取得できませんでした。";
                summaryResult.textContent = summary;

                // 生成結果を一時保存。ホーム画面でも使う。
                localStorage.setItem(AI_SUMMARY_STORAGE_KEY, summary);
            } catch (error) {
                console.error(error);
                summaryResult.textContent = "AIサマリーの生成に失敗しました。";
            } finally {
                summaryLoading.style.display = "none";
                summaryButton.disabled = false;
            }
        });
    }

    function escapeHtml(text) {
        return String(text ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function renderEmptyMessages(text) {
        messageList.innerHTML = `<div class="chat-empty">${escapeHtml(text)}</div>`;
    }

    function getSessionTitle(session) {
        return session.title || `チャット ${session.chatId}`;
    }

    function setCurrentChatTitle(title) {
        currentChatTitle.textContent = title || "新しいチャット";
    }

    function appendMessage(role, content) {
        const isUser = role === "USER" || role === "user";

        const wrapper = document.createElement("div");
        wrapper.className = `chat-row ${isUser ? "user" : "assistant"}`;

        wrapper.innerHTML = `
            <div class="chat-bubble ${isUser ? "user" : "assistant"}">
                <div class="chat-message-role">${isUser ? "You" : "AI"}</div>
				<div class="chat-message-content">${escapeHtml(content)}</div>
            </div>
        `;

        if (messageList.querySelector(".chat-empty")) {
            messageList.innerHTML = "";
        }

        messageList.appendChild(wrapper);
        messageList.scrollTop = messageList.scrollHeight;
    }

    function renderSessions() {
        if (!sessionList) return;

        if (sessions.length === 0) {
            sessionList.innerHTML = `<div class="chat-empty">まだチャットはありません。</div>`;
            return;
        }

        sessionList.innerHTML = "";

        sessions.forEach(session => {
            const item = document.createElement("div");
            item.className = "chat-session-item" + (session.chatId === currentChatId ? " active" : "");

            const title = getSessionTitle(session);

            item.innerHTML = `
                <button type="button" class="chat-session-main">
                    <span class="chat-session-title">${escapeHtml(title)}</span>
                </button>
                <button type="button" class="chat-session-delete" aria-label="削除">×</button>
            `;

            item.querySelector(".chat-session-main").addEventListener("click", async function () {
                currentChatId = session.chatId;
                setCurrentChatTitle(title);
                renderSessions();
                await loadMessages(currentChatId);
            });

            item.querySelector(".chat-session-delete").addEventListener("click", async function (event) {
                event.stopPropagation();
                await deleteChat(session.chatId);
            });

            sessionList.appendChild(item);
        });
    }

    function upsertSession(chatId, title) {
        const existingIndex = sessions.findIndex(session => session.chatId === chatId);

        if (existingIndex >= 0) {
            const existing = sessions[existingIndex];
            sessions.splice(existingIndex, 1);
            sessions.unshift({
                chatId: existing.chatId,
                title: title || existing.title || `チャット ${chatId}`
            });
        } else {
            sessions.unshift({
                chatId: chatId,
                title: title || `チャット ${chatId}`
            });
        }

        renderSessions();
    }

    async function loadSessions() {
        try {
            const response = await fetch("/api/chat/sessions");

            if (!response.ok) {
                throw new Error("failed to load sessions");
            }

            const data = await response.json();

            if (!Array.isArray(data)) {
                sessions = [];
                currentChatId = null;
                setCurrentChatTitle("新しいチャット");
                renderSessions();
                renderEmptyMessages("まだ対話はありません。新しいメッセージを送ってください。");
                return;
            }

            sessions = data;

            if (sessions.length > 0) {
                currentChatId = sessions[0].chatId;
                setCurrentChatTitle(getSessionTitle(sessions[0]));
                renderSessions();
                await loadMessages(currentChatId);
            } else {
                currentChatId = null;
                setCurrentChatTitle("新しいチャット");
                renderSessions();
                renderEmptyMessages("まだ対話はありません。新しいメッセージを送ってください。");
            }
        } catch (error) {
            console.error(error);
            sessions = [];
            currentChatId = null;
            setCurrentChatTitle("新しいチャット");
            renderSessions();
            renderEmptyMessages("チャット一覧の取得に失敗しました。");
        }
    }

    async function loadMessages(chatId) {
        if (!chatId) {
            setCurrentChatTitle("新しいチャット");
            renderEmptyMessages("まだ対話はありません。新しいメッセージを送ってください。");
            return;
        }

        chatLoading.style.display = "block";
        messageList.innerHTML = "";

        try {
            const response = await fetch(`/api/chat/${chatId}/messages`);

            if (!response.ok) {
                throw new Error("failed to load messages");
            }

            const messages = await response.json();

            if (!Array.isArray(messages) || messages.length === 0) {
                renderEmptyMessages("まだ対話はありません。");
                return;
            }

            messageList.innerHTML = "";
            messages.forEach(message => {
                appendMessage(message.role, message.content);
            });
        } catch (error) {
            console.error(error);
            renderEmptyMessages("メッセージ履歴の取得に失敗しました。");
        } finally {
            chatLoading.style.display = "none";
        }
    }

    async function sendMessage() {
        const message = chatInput.value.trim();

        if (!message) {
            alert("質問を入力してください。");
            return;
        }

        chatButton.disabled = true;
        chatLoading.style.display = "block";

        const draftMessage = message;
        chatInput.value = "";

        if (!currentChatId && messageList.querySelector(".chat-empty")) {
            messageList.innerHTML = "";
        }

        appendMessage("USER", draftMessage);

        try {
            const response = await fetch("/api/chat/send", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chatId: currentChatId,
                    message: draftMessage
                })
            });

            if (!response.ok) {
                throw new Error("request failed");
            }

            const data = await response.json();

            if (data.success === false) {
                throw new Error(data.error || "AI対話に失敗しました。");
            }

            if (data.chatId) {
                currentChatId = data.chatId;

                const newTitle = draftMessage.length <= 24
                    ? draftMessage
                    : draftMessage.substring(0, 24) + "...";

                setCurrentChatTitle(newTitle);
                upsertSession(currentChatId, newTitle);
            }

            appendMessage("ASSISTANT", data.reply ?? "AIの応答を取得できませんでした。");
        } catch (error) {
            console.error(error);
            appendMessage("ASSISTANT", error.message || "AI対話に失敗しました。");
        } finally {
            chatLoading.style.display = "none";
            chatButton.disabled = false;
            chatInput.focus();
        }
    }

    function startNewChat() {
        currentChatId = null;
        setCurrentChatTitle("新しいチャット");
        renderSessions();
        renderEmptyMessages("まだ対話はありません。新しいメッセージを送ってください。");
        chatInput.value = "";
        chatInput.focus();
    }

    async function deleteChat(chatId) {
        if (!chatId) {
            alert("削除するチャットがありません。");
            return;
        }

        if (!confirm("このチャットを削除しますか？")) {
            return;
        }

        try {
            const response = await fetch(`/api/chat/${chatId}`, {
                method: "DELETE"
            });

            if (!response.ok) {
                throw new Error("delete failed");
            }

            sessions = sessions.filter(session => session.chatId !== chatId);

            if (currentChatId === chatId) {
                if (sessions.length > 0) {
                    currentChatId = sessions[0].chatId;
                    setCurrentChatTitle(getSessionTitle(sessions[0]));
                    renderSessions();
                    await loadMessages(currentChatId);
                } else {
                    currentChatId = null;
                    setCurrentChatTitle("新しいチャット");
                    renderSessions();
                    renderEmptyMessages("チャットを削除しました。");
                }
            } else {
                renderSessions();
            }

            chatInput.value = "";
            chatInput.focus();
        } catch (error) {
            console.error(error);
            alert("チャット削除に失敗しました。");
        }
    }

    if (chatButton) {
        chatButton.addEventListener("click", sendMessage);
    }

    if (chatInput) {
        chatInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
    }

    if (newChatButton) {
        newChatButton.addEventListener("click", startNewChat);
    }

    loadSessions();
});
</script>
</body>
</html>
