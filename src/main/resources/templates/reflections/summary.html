<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>振り返り</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">JobTrack</div>
        <nav class="nav-group">
            <a class="nav-link" th:href="@{/dashboard}">ホーム</a>
            <a class="nav-link" th:href="@{/applications}">応募一覧</a>
            <a class="nav-link" th:href="@{/activities}">活動記録</a>
            <a class="nav-link active" th:href="@{/reflections}">振り返り</a>
            <a class="nav-link" th:href="@{/settings}">設定</a>
        </nav>
    </aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h1 class="page-title">振り返り</h1>
                <p class="page-desc">最近の動きと全体の流れを見返せます。</p>
            </div>
        </div>

        <section class="grid-3">
            <div class="card stat-card">
                <div class="stat-label">最近7日</div>
                <div class="stat-value" th:text="${recent7Count}">0</div>
                <div class="stat-sub">最近7日の動き</div>
            </div>

            <div class="card stat-card">
                <div class="stat-label">最近30日</div>
                <div class="stat-value" th:text="${recent30Count}">0</div>
                <div class="stat-sub">この1か月の動き</div>
            </div>

            <div class="card stat-card">
                <div class="stat-label">全体</div>
                <div class="stat-value" th:text="${totalCount}">0</div>
                <div class="stat-sub">これまでの応募数</div>
            </div>
        </section>

        <section class="card">
            <div class="card-title-row">
                <h2 class="card-title">簡単フィードバック</h2>
                <span class="card-subtext">今の状況をひとことにまとめています</span>
            </div>

            <div class="notice-list" th:if="${summaryMessages != null and !#lists.isEmpty(summaryMessages)}">
                <div class="notice-item notice-info" th:each="msg : ${summaryMessages}" th:text="${msg}">
                    フィードバック
                </div>
            </div>

            <div class="empty-box" th:if="${summaryMessages == null or #lists.isEmpty(summaryMessages)}">
                まだ振り返れる内容がありません。
            </div>
        </section>

        <section class="card">
            <div class="card-title-row">
                <h2 class="card-title">AIサマリー</h2>
                <span class="card-subtext">応募状況をもとに、振り返りの要点を整理します</span>
            </div>

            <p class="page-desc" style="margin-top: 0;">
                AI連携は未実装です。
            </p>

            <div style="margin-top: 12px;">
                <button type="button" id="generate-ai-summary-btn" class="btn btn-primary">
                    AIで振り返りを生成
                </button>
            </div>

            <div id="ai-summary-loading" class="card-subtext" style="margin-top: 12px; display: none;">
                生成中...
            </div>

            <div id="ai-summary-result"
                 class="empty-box"
                 style="margin-top: 12px; white-space: pre-line;">
                まだAIサマリーは生成されていません。
            </div>
        </section>
    </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const button = document.getElementById("generate-ai-summary-btn");
    const loading = document.getElementById("ai-summary-loading");
    const result = document.getElementById("ai-summary-result");

    if (!button || !loading || !result) {
        return;
    }

    button.addEventListener("click", async function () {
        button.disabled = true;
        loading.style.display = "block";
        result.textContent = "";

        try {
            const response = await fetch("/reflections/ai-summary", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                }
            });

            if (!response.ok) {
                throw new Error("request failed");
            }

            const data = await response.json();
            result.textContent = data.summary ?? "AIサマリーを取得できませんでした。";
        } catch (error) {
            console.error(error);
            result.textContent = "AIサマリーの生成に失敗しました。";
        } finally {
            loading.style.display = "none";
            button.disabled = false;
        }
    });
});
</script>
</body>
</html>
